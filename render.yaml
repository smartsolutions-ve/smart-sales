databases:
  - name: smartsales-db
    plan: free
    databaseName: smartsales
    user: smartsales

services:
  - type: web
    name: smartsales
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.render
      - key: DATABASE_URL
        fromDatabase:
          name: smartsales-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: "google/gemma-3-27b-it:free"
      - key: CHAT_IA_BACKEND
        value: "apps.chat_ia.services.gemini.GeminiBackend"
      - key: DEFAULT_FROM_EMAIL
        value: "noreply@smartsales.com.ve"
      - key: RESEND_API_KEY
        value: "re_placeholder"
