<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — SmartSales</title>
  <script>
    if(localStorage.getItem('darkMode')==='true'||(!localStorage.getItem('darkMode')&&window.matchMedia('(prefers-color-scheme:dark)').matches)){
      document.documentElement.classList.add('dark');
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Outfit', 'sans-serif'] },
          colors: { brand: { blue: '#0066FF' } },
        }
      }
    }
  </script>
</head>
<body class="font-sans antialiased h-full bg-slate-50 dark:bg-[#0B1120] text-slate-900 dark:text-white flex items-center justify-center px-4">
  <div class="text-center">
    <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-brand-blue to-blue-600 mb-6 shadow-xl shadow-brand-blue/20">
      <span class="text-white text-3xl font-bold">404</span>
    </div>
    <h1 class="text-2xl font-bold mb-2">Pagina no encontrada</h1>
    <p class="text-slate-500 dark:text-slate-400 mb-6 max-w-sm mx-auto">La pagina que buscas no existe o fue movida a otra ubicacion.</p>
    <a href="/" class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl font-semibold text-white text-sm bg-gradient-to-r from-brand-blue to-blue-600 hover:from-blue-700 hover:to-blue-800 transition-all shadow-md shadow-brand-blue/20">
      <i class="fas fa-arrow-left text-xs"></i>
      Volver al inicio
    </a>
  </div>
</body>
</html>
