{% extends "base.html" %}

{% block title %}Cuenta suspendida — SmartSales{% endblock %}

{% block content_simple %}
<div class="min-h-screen flex items-center justify-center bg-slate-50 px-4">
  <div class="w-full max-w-md text-center">
    <div class="bg-white dark:bg-slate-900/50 rounded-2xl shadow-sm border border-slate-200 dark:border-white/10 p-10">
      <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="h-8 w-8 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-slate-900 mb-2">Cuenta suspendida</h1>
      <p class="text-slate-600 text-sm mb-6">
        Tu organización no tiene acceso activo al sistema.
        Contacta a SmartSales para reactivar tu cuenta.
      </p>
      <a href="{% url 'accounts:login' %}"
         class="text-sm text-brand hover:underline">← Volver al login</a>
    </div>
    <p class="text-center text-xs text-slate-400 mt-6">SmartSales © 2026</p>
  </div>
</div>
{% endblock %}
