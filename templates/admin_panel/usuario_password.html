{% extends "base.html" %}

{% block title %}Cambiar Contraseña — {{ usuario.username }}{% endblock %}
{% block breadcrumb %}Cambiar Contraseña{% endblock %}

{% block content %}
<div class="p-6 max-w-md">

  <div class="flex items-center gap-4 mb-6">
    <a href="{% url 'admin_panel:usuario_editar' org_pk=org.pk user_pk=usuario.pk %}"
       class="text-slate-400 hover:text-brand-blue transition-colors">
      <i class="fas fa-arrow-left"></i>
    </a>
    <div>
      <h1 class="text-title">Cambiar Contraseña</h1>
      <p class="text-subtitle">@{{ usuario.username }} — {{ org.name }}</p>
    </div>
  </div>

  <form method="post">
    {% csrf_token %}

    <div class="card-glass space-y-4">

      <div>
        <label class="label-base">Nueva contraseña <span class="text-red-500">*</span></label>
        <div class="relative">
          <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
          <input type="password" name="password" required
                 class="input-base pl-10" placeholder="Mínimo 8 caracteres"
                 minlength="8">
        </div>
      </div>

      <div>
        <label class="label-base">Confirmar contraseña <span class="text-red-500">*</span></label>
        <div class="relative">
          <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
          <input type="password" name="password2" required
                 class="input-base pl-10" placeholder="Repite la contraseña"
                 minlength="8">
        </div>
      </div>

    </div>

    <div class="flex gap-3 mt-5">
      <button type="submit" class="btn-primary">
        <i class="fas fa-key"></i> Actualizar Contraseña
      </button>
      <a href="{% url 'admin_panel:usuario_editar' org_pk=org.pk user_pk=usuario.pk %}"
         class="btn-secondary">Cancelar</a>
    </div>
  </form>

</div>
{% endblock %}
