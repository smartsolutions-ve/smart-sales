{% extends "base.html" %}

{% block title %}Registrar Competencia — SmartSales{% endblock %}
{% block breadcrumb %}Competencia{% endblock %}

{% block content %}
<div class="p-6 max-w-2xl">

  <div class="flex items-center gap-4 mb-6">
    <a href="{% url 'competencia:lista' %}" class="text-slate-400 hover:text-brand-blue transition-colors">
      <i class="fas fa-arrow-left"></i>
    </a>
    <h1 class="text-title">Registrar Hallazgo de Competencia</h1>
  </div>

  <form method="post" action="{% url 'competencia:crear' %}">
    {% csrf_token %}

    <div class="card-glass space-y-4">

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="label-base">Producto <span class="text-red-500">*</span></label>
          <input type="text" name="producto" required
                 class="input-base" placeholder="Nombre del producto">
        </div>
        <div>
          <label class="label-base">Competidor <span class="text-red-500">*</span></label>
          <input type="text" name="competidor" required
                 class="input-base" placeholder="Nombre del competidor">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="label-base">Cliente (opcional)</label>
          <select name="cliente_id" class="input-base">
            <option value="">— Sin cliente específico —</option>
            {% for c in clientes %}
            <option value="{{ c.pk }}">{{ c.nombre }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="label-base">Fecha del hallazgo</label>
          <input type="date" name="fecha" class="input-base">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="label-base">Precio del competidor</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm">$</span>
            <input type="number" name="precio_comp" min="0" step="0.01"
                   class="input-base pl-8" placeholder="0.00">
          </div>
        </div>
        <div>
          <label class="label-base">Nuestro precio</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm">$</span>
            <input type="number" name="precio_nuestro" min="0" step="0.01"
                   class="input-base pl-8" placeholder="0.00">
          </div>
        </div>
      </div>

      <div>
        <label class="label-base">Acción tomada</label>
        <textarea name="accion_tomada" rows="2"
                  class="input-base"
                  placeholder="¿Qué decisión tomaste ante este hallazgo?"></textarea>
      </div>
    </div>

    <div class="flex gap-3 mt-5">
      <button type="submit" class="btn-primary">
        <i class="fas fa-save"></i> Guardar Registro
      </button>
      <a href="{% url 'competencia:lista' %}" class="btn-secondary">Cancelar</a>
    </div>
  </form>

</div>
{% endblock %}
