{% for l in listas %}
<div class="flex items-center justify-between px-5 py-2.5 group">
  <div class="flex items-center gap-2">
    <span class="font-mono text-xs font-bold text-brand-blue bg-blue-50 dark:bg-blue-500/10 w-7 h-7 rounded-lg flex items-center justify-center">{{ l.codigo }}</span>
    <span class="text-sm font-medium">{{ l.nombre }}</span>
    {% if l.es_default %}<span class="badge-success text-[10px]">Default</span>{% endif %}
  </div>
  <div class="flex items-center gap-3">
    <span class="text-sm text-slate-500">-{{ l.descuento_porcentaje }}%</span>
    <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
      <button hx-get="{% url 'configuracion:listas_editar' l.pk %}"
              hx-target="#modal-body"
              hx-swap="innerHTML"
              hx-on:htmx:after-swap="document.dispatchEvent(new CustomEvent('open-modal'))"
              class="w-6 h-6 rounded-md bg-slate-100 dark:bg-white/[0.06] text-slate-500 hover:bg-amber-500 hover:text-white flex items-center justify-center text-[11px] transition-all"
              title="Editar">
        <i class="fas fa-pen"></i>
      </button>
      {% if not l.es_default %}
      <button hx-post="{% url 'configuracion:listas_eliminar' l.pk %}"
              hx-confirm="¿Desactivar la lista '{{ l.nombre }}'?"
              class="w-6 h-6 rounded-md bg-slate-100 dark:bg-white/[0.06] text-slate-500 hover:bg-red-500 hover:text-white flex items-center justify-center text-[11px] transition-all"
              title="Eliminar">
        <i class="fas fa-trash"></i>
      </button>
      {% endif %}
    </div>
  </div>
</div>
{% empty %}
<p class="px-5 py-4 text-sm text-slate-400">Sin listas de precios.</p>
{% endfor %}
