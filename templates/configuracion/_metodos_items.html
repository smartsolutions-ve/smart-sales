{% for m in metodos %}
<div class="flex items-center justify-between px-5 py-2.5 group">
  <div class="flex items-center gap-2">
    <span class="text-sm font-medium">{{ m.nombre }}</span>
    {% if m.tipo == 'CREDITO' and m.dias_credito %}
    <span class="text-[10px] text-amber-600 dark:text-amber-400 bg-amber-50 dark:bg-amber-500/10 px-1.5 py-0.5 rounded font-medium">{{ m.dias_credito }}d</span>
    {% endif %}
  </div>
  <div class="flex items-center gap-3">
    <span class="badge-neutral text-[11px]">{{ m.get_tipo_display }}</span>
    <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
      <button hx-get="{% url 'configuracion:metodos_editar' m.pk %}"
              hx-target="#modal-body"
              hx-swap="innerHTML"
              hx-on:htmx:after-swap="document.dispatchEvent(new CustomEvent('open-modal'))"
              class="w-6 h-6 rounded-md bg-slate-100 dark:bg-white/[0.06] text-slate-500 hover:bg-amber-500 hover:text-white flex items-center justify-center text-[11px] transition-all"
              title="Editar">
        <i class="fas fa-pen"></i>
      </button>
      <button hx-post="{% url 'configuracion:metodos_eliminar' m.pk %}"
              hx-confirm="¿Eliminar el método '{{ m.nombre }}'?"
              class="w-6 h-6 rounded-md bg-slate-100 dark:bg-white/[0.06] text-slate-500 hover:bg-red-500 hover:text-white flex items-center justify-center text-[11px] transition-all"
              title="Eliminar">
        <i class="fas fa-trash"></i>
      </button>
    </div>
  </div>
</div>
{% empty %}
<p class="px-5 py-4 text-sm text-slate-400">Sin métodos de pago.</p>
{% endfor %}
