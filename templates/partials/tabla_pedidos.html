{% if pedidos %}
<div class="overflow-x-auto">
  <table data-datatable class="w-full text-left min-w-[700px]">
    <thead>
      <tr>
        <th>N Pedido</th>
        <th>Fecha</th>
        <th>Cliente</th>
        <th>Vendedor</th>
        <th>Estado</th>
        <th>Facturacion</th>
        <th>Total</th>
        <th data-sortable="false"></th>
      </tr>
    </thead>
    <tbody>
      {% for pedido in pedidos %}
      {% include 'partials/fila_pedido.html' %}
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<div class="text-center py-16 text-slate-400">
  <i class="fas fa-clipboard-list text-4xl mb-3 opacity-30"></i>
  <p class="text-lg font-medium">No hay pedidos</p>
  <a href="{% url 'pedidos:crear' %}" class="mt-3 inline-block text-brand-blue hover:underline text-sm font-medium">
    Crear el primero &rarr;
  </a>
</div>
{% endif %}
