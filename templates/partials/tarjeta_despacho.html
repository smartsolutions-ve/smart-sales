<div id="tarjeta-{{ pedido.pk }}"
     class="surface-base rounded-xl p-3 space-y-2 hover:shadow-md dark:hover:border-white/10 transition-all {% if pedido.fecha_entrega and today and pedido.fecha_entrega < today %}border-l-4 border-l-red-500 bg-red-50 dark:bg-red-900/20{% endif %}">
  <div class="flex items-start justify-between">
    <a href="{% url 'pedidos:detalle' pedido.pk %}"
       class="text-sm font-bold text-brand-blue hover:underline font-mono">{{ pedido.numero }}</a>
    <div class="flex items-center gap-1">
      {% if pedido.fecha_entrega and today and pedido.fecha_entrega < today %}
      <span class="text-[10px] font-bold text-red-600 dark:text-red-400 bg-red-100 dark:bg-red-900/40 rounded px-1.5 py-0.5">Vencido</span>
      {% endif %}
      {% if pedido.fecha_entrega %}
      <span class="text-[10px] {% if today and pedido.fecha_entrega < today %}text-red-500 dark:text-red-400{% else %}text-slate-400 dark:text-slate-500{% endif %} font-mono">{{ pedido.fecha_entrega }}</span>
      {% endif %}
    </div>
  </div>
  <p class="text-xs font-semibold text-slate-700 dark:text-slate-300">{{ pedido.cliente }}</p>
  <p class="text-xs text-slate-400 dark:text-slate-500">{{ pedido.vendedor.get_full_name|default:pedido.vendedor.username }}</p>
  <form method="post" action="{% url 'despacho:cambiar_estado' pedido.pk %}"
        hx-post="{% url 'despacho:cambiar_estado' pedido.pk %}"
        hx-target="#tarjeta-{{ pedido.pk }}"
        hx-swap="outerHTML">
    {% csrf_token %}
    <select name="estado_despacho" onchange="this.form.submit()"
            class="w-full text-xs border border-slate-200 dark:border-white/10 rounded-lg px-2 py-1 bg-white dark:bg-slate-800 dark:text-slate-300 cursor-pointer">
      {% for valor, label in pedido.ESTADOS_DESPACHO %}
      <option value="{{ valor }}" {% if pedido.estado_despacho == valor %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </form>
</div>
